<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="url(#bg)" stroke="url(#accent)" stroke-width="4" />
  
  <!-- Constellation W -->
  <path d="M 25 35 L 40 65 L 50 50 L 60 65 L 75 35" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Nodes -->
  <circle cx="25" cy="35" r="5" fill="#ffffff" />
  <circle cx="40" cy="65" r="5" fill="#ffffff" />
  <circle cx="50" cy="50" r="5" fill="#ffffff" />
  <circle cx="60" cy="65" r="5" fill="#ffffff" />
  <circle cx="75" cy="35" r="5" fill="#ffffff" />
</svg>
