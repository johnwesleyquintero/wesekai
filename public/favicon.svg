<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Accent -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="28" fill="url(#bg)" />

  <!-- Portal Ring (thicker for visibility) -->
  <circle
    cx="50"
    cy="50"
    r="26"
    stroke="url(#accent)"
    stroke-width="6"
    fill="none"
  />

  <!-- Sword Core -->
  <!-- Tip -->
  <path d="M50 26 L56 40 L50 46 L44 40 Z" fill="#ffffff" />

  <!-- Blade -->
  <rect x="48" y="46" width="4" height="22" rx="2" fill="#ffffff" />

  <!-- Guard -->
  <rect x="42" y="66" width="16" height="4" rx="2" fill="#ffffff" />

  <!-- Core Focus Dot -->
  <circle cx="50" cy="50" r="4" fill="#ffffff" />
</svg>